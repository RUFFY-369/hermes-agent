name: command-execution
description: "Execute shell commands and verify correct output"
domain: software-development
complexity: 1
success_criteria:
  - type: test_pass
    command: "echo 'evolution test passed at $(date)' > /tmp/evo-cmd-test.txt && test -f /tmp/evo-cmd-test.txt"
    weight: 1.0
  - type: command_output
    command: "cat /tmp/evo-cmd-test.txt"
    expected_output: "evolution test passed"
    weight: 1.0
timeout_seconds: 15
max_turns: 3
